<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 Calorie Tracker - Track Your Daily Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .animate-slide {
            animation: slideDown 0.3s ease-out;
        }
        .hover-scale {
            transition: transform 0.2s ease;
        }
        .hover-scale:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen">
    
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="text-3xl">🍎</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-800">Calorie Tracker</h1>
                        <p class="text-xs text-gray-500">Track what you eat</p>
                    </div>
                </div>
                <div class="hidden md:block text-sm text-gray-400">
                    🏃‍♂️ Stay healthy | 💪 Reach your goals
                </div>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-6xl mx-auto px-4 mt-4">
        {% for message in messages %}
        <div class="animate-slide p-4 rounded-lg mb-3 {% if message.tags == 'success' %}bg-green-100 border-l-4 border-green-500 text-green-700{% elif message.tags == 'error' %}bg-red-100 border-l-4 border-red-500 text-red-700{% else %}bg-blue-100 border-l-4 border-blue-500 text-blue-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer class="mt-16 py-6 text-center text-gray-400 text-sm border-t">
        <p>© 2024 Calorie Tracker | Made with ❤️ for a healthier you</p>
    </footer>
</body>
</html>
