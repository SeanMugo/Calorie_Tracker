{% extends 'calorie_tracker/base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-red-50 px-6 py-4 border-b border-red-100">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">⚠️</span>
                <h3 class="text-lg font-semibold text-red-700">Confirm Deletion</h3>
            </div>
        </div>
        
        <div class="p-6 text-center">
            <div class="text-7xl mb-4">🍽️</div>
            <p class="text-gray-700 mb-2">Are you sure you want to delete:</p>
            <p class="font-bold text-xl text-gray-800 mb-1">{{ food_item.name }}</p>
            <p class="text-orange-600 font-semibold text-lg mb-6">{{ food_item.calories }} calories</p>
            
            <div class="flex gap-3">
                <form method="post" class="flex-1">
                    {% csrf_token %}
                    <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white px-4 py-3 rounded-xl font-semibold transition duration-200">
                        Yes, Delete
                    </button>
                </form>
                <a href="{% url 'home' %}" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 text-center px-4 py-3 rounded-xl font-semibold transition duration-200">
                    Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
